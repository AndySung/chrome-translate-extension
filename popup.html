<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词翻译助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 200px;
    }
    
    .container {
      text-align: center;
      color: white;
    }
    
    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    
    .tips {
      text-align: left;
      background: rgba(255, 255, 255, 0.15);
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.8;
    }
    
    .tips-title {
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .footer {
      margin-top: 16px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌐</div>
    <h1>划词翻译助手</h1>
    <p class="subtitle">选中文字即可自动翻译</p>
    
    <div class="status">
      ✅ 插件已启用
    </div>
    
    <div class="tips">
      <div class="tips-title">📖 使用方法：</div>
      <div>1. 选中网页上的英文文字</div>
      <div>2. 自动弹出翻译结果</div>
      <div>3. 按 ESC 关闭弹窗</div>
    </div>
    
    <div class="footer">
      v1.0.0 | 免费翻译 API
    </div>
  </div>
</body>
</html>
